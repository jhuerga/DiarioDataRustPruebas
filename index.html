<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Diario Data</title>
    <style>
      /* Reset b�sico */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f5f5;
        color: #333;
        line-height: 1.6;
      }

      #root {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 20px;
      }

      .page-container {
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        padding: 30px;
        max-width: 800px;
        width: 100%;
        margin-top: 20px;
      }

      .page-container h1 {
        color: #2c3e50;
        margin-bottom: 30px;
        text-align: center;
        font-size: 2.5em;
        font-weight: 300;
      }

      .persona-form-container {
        display: flex;
        flex-direction: column;
        gap: 30px;
      }

      .section {
        background: #fafafa;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 20px;
      }

      .section h2 {
        color: #34495e;
        margin-bottom: 20px;
        font-size: 1.5em;
        font-weight: 500;
        border-bottom: 2px solid #3498db;
        padding-bottom: 10px;
      }

      input, select, textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
        transition: border-color 0.3s ease;
      }

      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #3498db;
        box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        color: #555;
      }

      input[type="checkbox"] {
        width: auto;
        margin-right: 10px;
      }

      .checkbox-container {
        display: flex;
        align-items: center;
      }

      .checkbox-container label {
        margin-bottom: 0;
      }

      .btn {
        background-color: #3498db;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        align-self: flex-end;
      }

      .btn:hover {
        background-color: #2980b9;
      }

      .btn:focus {
        outline: none;
        box-shadow: 0 0 5px rgba(52, 152, 219, 0.5);
      }

      .warning {
        color: #e74c3c;
        font-size: 14px;
        margin-top: 5px;
      }

      .field-group {
        margin-bottom: 20px;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 20px;
      }

      @media (max-width: 600px) {
        .page-container {
          padding: 20px;
          margin-top: 10px;
        }
        .section {
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import init from "./dist/diario_data.js";
      init();
    </script>
  </body>
</html>
